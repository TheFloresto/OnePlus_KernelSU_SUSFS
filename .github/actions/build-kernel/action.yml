name: Build LineageOS sm6375 Kernel
permissions:
  contents: write
  actions: write

inputs:
  model:
    required: true
    type: string
  soc:
    required: true
    type: string
  branch:
    required: true
    type: string
  manifest:
    required: true
    type: string
  android_version:
    required: true
    type: string
  kernel_version:
    required: true
    type: string
  ksun_branch:
    required: true
    type: string
    default: stable
  susfs_branch:
    required: true
    type: string
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Build System
      shell: bash
      run: |
        export DEBIAN_FRONTEND=noninteractive
        echo "DEBIAN_FRONTEND=noninteractive" >> $GITHUB_ENV

        df -h

        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/share/powershell /usr/share/swift || true
        sudo docker image prune --all --force
        echo "some directories deleted"

        sudo apt-get purge -y \
          aria2 ansible azure-cli shellcheck rpm xorriso zsync \
          esl-erlang firefox gfortran-8 gfortran-9 google-chrome-stable \
          google-cloud-sdk imagemagick \
          libmagickcore-dev libmagickwand-dev libmagic-dev ant ant-optional kubectl \
          mercurial apt-transport-https mono-complete libmysqlclient \
          unixodbc-dev yarn chrpath libssl-dev libxft-dev \
          libfreetype6 libfreetype6-dev libfontconfig1 libfontconfig1-dev \
          snmp pollinate libpq-dev postgresql-client powershell ruby-full \
          sphinxsearch subversion mongodb-org microsoft-edge-stable || true

        sudo apt-get purge -y $(dpkg-query -W -f='${binary:Package}\n' | grep -E '^mysql|^php|^dotnet') || true

        sudo apt-get autoremove -y
        sudo apt-get autoclean -y
        echo "some packages purged"

        df -h

        echo "Installing dependencies"
        sudo apt update
        sudo apt install -y python3 python-is-python3 git curl bc bison build-essential ccache flex libelf-dev libssl-dev zlib1g-dev

        mkdir -p ./git-repo
        curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > ./git-repo/repo
        chmod a+rx ./git-repo/repo
        echo "REPO=$GITHUB_WORKSPACE/./git-repo/repo" >> $GITHUB_ENV

        echo "CONFIG=${{ inputs.model }}" >> $GITHUB_ENV

    - name: Clone AnyKernel3 and Other Dependencies
      shell: bash
      run: |
        echo "Cloning AnyKernel3 and other dependencies..."

        ANYKERNEL_BRANCH="gki-2.0"
        if [[ -z "${{ inputs.susfs_branch }}" ]]; then
          SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
        else
          SUSFS_BRANCH="${{ inputs.susfs_branch }}"
        fi

        echo "Using branch for AnyKernel3: $ANYKERNEL_BRANCH"
        echo "Using branch for SUSFS: $SUSFS_BRANCH"

        git clone https://github.com/TheWildJames/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
        git clone https://github.com/TheWildJames/kernel_patches.git
        git clone https://gitlab.com/simonpunk/susfs4ksu.git
        cd susfs4ksu || exit 1

        if git rev-parse --verify "origin/$SUSFS_BRANCH" >/dev/null 2>&1 || git rev-parse --verify "$SUSFS_BRANCH" >/dev/null 2>&1; then
          git checkout "$SUSFS_BRANCH"
        else
          echo "Error: '$SUSFS_BRANCH' is neither a valid branch/tag nor a valid commit hash."
          exit 1
        fi

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        echo "Creating folder for configuration: $CONFIG..."
        mkdir -p "$CONFIG"
        cd "$CONFIG"

        echo "Cloning LineageOS sm6375 kernel source..."
        git clone https://github.com/LineageOS/android_kernel_oneplus_sm6375.git -b ${{ inputs.branch }} --depth=1
        mv android_kernel_oneplus_sm6375 kernel_platform

    - name: Add KernelSU Next
      shell: bash
      run: |
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"

        echo "Adding KernelSU Next..."
        if [ "${{ inputs.ksun_branch }}" == "stable" ]; then
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
        else
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s ${{ inputs.ksun_branch }}
        fi

        git submodule update --init --recursive

    - name: Apply SUSFS Patches
      shell: bash
      run: |
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"

        echo "Applying SUSFS patches..."

        cp ../../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./kernel/
        cp ../../susfs4ksu/kernel_patches/fs/* ./kernel/fs/
        cp ../../susfs4ksu/kernel_patches/include/linux/* ./kernel/include/linux/

        cd ./KernelSU-Next

        echo "Applying next SUSFS patches..."
        susfs_version=$(grep '#define SUSFS_VERSION' ../kernel/include/linux/susfs.h | awk -F'"' '{print $2}')
        echo "SUSVER=$susfs_version" >> $GITHUB_ENV
        BASE_VERSION=10200
        cd ./kernel
        KSU_VERSION=$(expr $(git rev-list --count HEAD) + $BASE_VERSION)
        sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" Makefile
        cd ..
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
        echo "KernelSU Next Version: $KSU_VERSION"
        echo "SusFS Version: $susfs_version"

        case "$susfs_version" in
          "v1.5.5"|"v1.5.6"|"v1.5.7")
            cp "../../../kernel_patches/next/0001-kernel-implement-susfs-v1.5.5-v1.5.7-KSUN-v1.0.8.patch" "./ksun_susfs_latest.patch"
            ;;
          "v1.5.8"|"v1.5.9")
            cp "../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" ./
            patch -p1 --forward --fuzz=3 < 10_enable_susfs_for_ksu.patch || true
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_apk_sign.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_apk_sign.c.patch
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_core_hook.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_core_hook.c.patch
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_selinux.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_selinux.c.patch
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_ksud.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_ksud.c.patch
            ;;
          *)
            echo "Invalid version: $susfs_version"
            exit 1
            ;;
        esac
        patch -p1 --forward < ksun_susfs_latest.patch || true

        cd ../kernel
        if [ "${{ inputs.android_version }}" = "android14" ] && [ "${{ inputs.kernel_version }}" = "5.15" ]; then
          if ! grep -qxF '#include <trace/hooks/fs.h>' ./fs/namespace.c; then
            sed -i '/#include <trace\/hooks\/blk.h>/a #include <trace\/hooks\/fs.h>' ./fs/namespace.c
          else
            echo "Line already present. Skipping insert."
          fi
        fi
        patch -p1 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true

        KERNEL_VERSION="${{ inputs.kernel_version }}"
        MIN_VERSION="5.16"
        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | head -n1)" = "$KERNEL_VERSION" ]; then
          echo "Patching ptrace!"
          patch -p1 -F 3 < "../../../kernel_patches/gki_ptrace.patch"
        else
          echo "Kernel >= $MIN_VERSION, skipping ptrace patch"
        fi

    - name: Apply KSUN Hooks
      shell: bash
      run: |
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform/kernel"
        echo "Applying KSUN Hooks..."
        cp ../../../kernel_patches/next/scope_min_manual_hooks_v1.4.patch ./manual_hooks.patch
        patch -p1 --fuzz=3 < ./manual_hooks.patch

    - name: Apply Hide Stuff Patches
      shell: bash
      run: |
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform/kernel"
        cp ../../../kernel_patches/69_hide_stuff.patch ./
        patch -p1 -F 3 < 69_hide_stuff.patch

    - name: Add KernelSU-Next and SUSFS Configuration
      shell: bash
      run: |
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform/kernel"

        echo "Adding configuration settings to defconfig..."
        echo "CONFIG_KSU=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_KPROBES_HOOK=n" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_TMPFS_XATTR=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_TMPFS_POSIX_ACL=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig

    - name: Add BBR Support
      shell: bash
      run: |
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform/kernel"

        echo "Adding BBR configuration..."
        echo "CONFIG_TCP_CONG_ADVANCED=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_TCP_CONG_BBR=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_TCP_CONG_BIC=n" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_TCP_CONG_WESTWOOD=n" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_TCP_CONG_HTCP=n" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_NET_SCH_FQ=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_NET_SCH_FQ_CODEL=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig

    - name: Add TTL Target Support
      shell: bash
      run: |
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform/kernel"

        echo "Adding TTL configuration..."
        echo "CONFIG_IP_NF_TARGET_TTL=m" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_IP6_NF_TARGET_HL=m" >> ./arch/arm64/configs/lineageos_sm6375_defconfig
        echo "CONFIG_IP6_NF_MATCH_HL=y" >> ./arch/arm64/configs/lineageos_sm6375_defconfig

    - name: Run sed Modifications
      shell: bash
      run: |
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"

        echo "Running sed modifications..."
        sed -i 's/CONFIG_LTO=n/CONFIG_LTO=y/' ./kernel/arch/arm64/configs/lineageos_sm6375_defconfig
        sed -i 's/CONFIG_LTO_CLANG_FULL=y/CONFIG_LTO_CLANG_THIN=y/' ./kernel/arch/arm64/configs/lineageos_sm6375_defconfig
        sed -i 's/CONFIG_LTO_CLANG_NONE=y/CONFIG_LTO_CLANG_THIN=y/' ./kernel/arch/arm64/configs/lineageos_sm6375_defconfig

        sed -i 's/-dirty//' ./scripts/setlocalversion
        sed -i 's/echo "${KERNELVERSION}${file_localversion}${config_localversion}${LOCALVERSION}${scm_version}"/echo "${KERNELVERSION}-${{ inputs.android_version }}-LineageOS"/' ./scripts/setlocalversion
        chmod +x ./scripts/setlocalversion

        DATE=$(date -u)
        perl -pi -e 's{UTS_VERSION="\$\S*"}{UTS_VERSION="#1 SMP PREEMPT $DATE"}' ./scripts/mkcompile_h

    - name: Build Kernel
      shell: bash
      run: |
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"

        echo "Setting up build environment..."
        sudo sh -c 'sync; echo 3 > /proc/sys/vm/drop_caches'

        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CLANG_TRIPLE=aarch64-linux-gnu-

        echo "Building kernel..."
        make O=/tmp/out lineageos_sm6375_defconfig
        make -j$(nproc --all) O=/tmp/out

        echo "Copying kernel image..."
        cp /tmp/out/arch/arm64/boot/Image.gz ../Image.gz

    - name: Create ZIP File
      shell: bash
      run: |
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG"

        echo "Copying Image..."
        cp Image.gz ../AnyKernel3/Image.gz

        echo "Navigating to AnyKernel3 directory..."
        cd ../AnyKernel3

        ZIP_NAME="AnyKernel3_${{ inputs.model }}_${{ inputs.android_version }}-${{ inputs.kernel_version }}_Next_${{ env.KSUVER }}_SUSFS_${{ env.SUSVER }}.zip"
        echo "Creating ZIP file $ZIP_NAME..."
        zip -r "../$ZIP_NAME" ./*

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-${{ env.CONFIG }}
        path: *.zip
